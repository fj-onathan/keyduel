services:
  postgres:
    image: postgres:16-alpine
    container_name: typing_game_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typing_game}
      POSTGRES_USER: ${POSTGRES_USER:-typing_game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typing_game}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - typing_game_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typing_game} -d ${POSTGRES_DB:-typing_game}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: typing_game_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - typing_game_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  typing_game_pg_data:
  typing_game_redis_data:
